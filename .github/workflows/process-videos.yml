name: Process Videos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-videos:
    runs-on: mp4  # GitHub Enterprise self-hosted runner (requires GPU for Real-ESRGAN)
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip ffmpeg aria2
          pip install --break-system-packages realesrgan ffmpeg-python
          # Fix basicsr compatibility with newer torchvision
          BASICSR_DEG=$(find "$(pip show basicsr | grep Location | cut -d' ' -f2)" -name "degradations.py" -path "*/basicsr/*" | head -1)
          if [ -f "$BASICSR_DEG" ]; then
            sed -i 's/from torchvision.transforms.functional_tensor import rgb_to_grayscale/from torchvision.transforms.functional import rgb_to_grayscale/' "$BASICSR_DEG"
          fi
          # Clone Real-ESRGAN repo for the inference script
          git clone --depth 1 https://github.com/xinntao/Real-ESRGAN.git /tmp/Real-ESRGAN
          # Generate missing version.py so the local realesrgan package loads correctly
          python3 -c "import importlib.metadata; v=importlib.metadata.version('realesrgan'); print(f\"__version__ = '{v}'\")" \
            > /tmp/Real-ESRGAN/realesrgan/version.py
          # Verify installation
          python3 /tmp/Real-ESRGAN/inference_realesrgan.py --help

      - name: Create working directories
        run: |
          mkdir -p downloads processed zips

      - name: Download videos
        run: |
          count=0
          total=$(wc -l < video_urls.txt)
          while IFS='|' read -r url rest || [ -n "$url" ]; do
            count=$((count + 1))
            # Strip leading number prefix (e.g. "1. https://..." -> "https://...")
            url=$(echo "$url" | sed -E 's/^[0-9]+\.\s*//')
            [ -z "$url" ] && continue
            # Extract filename from URL
            filename=$(basename "$url")
            # Make filename unique by prepending a counter
            unique_name="${count}_${filename}"
            # Get file size via HEAD request
            file_size=$(curl -sIL "$url" | grep -i content-length | tail -1 | tr -d '\r' | awk '{print $2}')
            if [ -n "$file_size" ] && [ "$file_size" -gt 0 ] 2>/dev/null; then
              if [ "$file_size" -ge 1073741824 ]; then
                size_hr=$(awk "BEGIN {printf \"%.2f GB\", $file_size/1073741824}")
              elif [ "$file_size" -ge 1048576 ]; then
                size_hr=$(awk "BEGIN {printf \"%.2f MB\", $file_size/1048576}")
              elif [ "$file_size" -ge 1024 ]; then
                size_hr=$(awk "BEGIN {printf \"%.2f KB\", $file_size/1024}")
              else
                size_hr="${file_size} B"
              fi
              echo "[$count/$total] Downloading: $filename ($size_hr)"
            else
              echo "[$count/$total] Downloading: $filename"
            fi
            aria2c -x 16 -s 16 -k 1M --file-allocation=none --max-tries=3 --retry-wait=5 \
              --console-log-level=warn --summary-interval=0 \
              -d downloads -o "${unique_name}" "$url" || {
              echo "WARNING: Failed to download $url"
              continue
            }
          done < video_urls.txt
          echo "Downloaded $(ls downloads/ | wc -l) videos"

      - name: Process videos - remove black borders and upscale with Real-ESRGAN
        run: |
          # Auto-detect GPU for Real-ESRGAN
          GPU_FLAG=""
          FP32_FLAG="--fp32"
          if command -v nvidia-smi &>/dev/null; then
            GPU_ID=$(nvidia-smi --query-gpu=index --format=csv,noheader | head -1 | tr -d '[:space:]')
            if [ -n "$GPU_ID" ]; then
              echo "GPU detected: ID $GPU_ID — using half precision (fp16)"
              GPU_FLAG="-g $GPU_ID"
              FP32_FLAG=""
            fi
          fi
          if [ -z "$GPU_FLAG" ]; then
            echo "No GPU detected, Real-ESRGAN will run on CPU with --fp32"
          fi

          for video in downloads/*; do
            [ -f "$video" ] || continue
            filename=$(basename "$video")
            echo "Processing: $filename"

            # Detect crop values (black borders) by analyzing 10 seconds of the video
            crop_info=$(ffmpeg -i "$video" -t 10 -vf cropdetect=24:16:0 -f null - 2>&1 \
              | grep -oP 'crop=\S+' | tail -1 || echo "")

            # Step 1: Apply crop if black borders detected
            cropped_video="downloads/cropped_${filename}"
            if [ -n "$crop_info" ]; then
              echo "  Detected crop: $crop_info"
              ffmpeg -y -i "$video" -vf "${crop_info}" -c:v libx264 -preset ultrafast -crf 18 -c:a copy \
                "$cropped_video" 2>/dev/null || {
                  echo "  WARNING: Crop failed, using original"
                  cropped_video="$video"
                }
            else
              echo "  No black borders detected"
              cropped_video="$video"
            fi

            # Step 2: Extract frames for Real-ESRGAN upscaling
            frames_dir="downloads/frames_${filename%.*}"
            upscaled_dir="downloads/upscaled_${filename%.*}"
            mkdir -p "$frames_dir" "$upscaled_dir"

            ffmpeg -y -i "$cropped_video" -qscale:v 1 -qmin 1 -qmax 1 \
              "${frames_dir}/frame_%06d.png" 2>/dev/null

            # Get original FPS and audio
            fps=$(ffprobe -v 0 -select_streams v -print_format flat \
              -show_entries stream=r_frame_rate "$cropped_video" | grep -oP '\d+/\d+' | head -1)
            [ -z "$fps" ] && fps="30/1"

            ffmpeg -y -i "$cropped_video" -vn -acodec copy "downloads/audio_${filename%.*}.aac" 2>/dev/null || true

            # Step 3: Upscale frames with Real-ESRGAN
            # Arguments verified: -n model_name -i input -o output -s outscale --fp32 --suffix --ext --tile -g gpu_id
            echo "  Upscaling frames with Real-ESRGAN (RealESRGAN_x4plus, outscale=2)..."
            python3 /tmp/Real-ESRGAN/inference_realesrgan.py \
              -n RealESRGAN_x4plus \
              -i "$frames_dir" \
              -o "$upscaled_dir" \
              -s 2 \
              --suffix "" \
              --ext png \
              $GPU_FLAG $FP32_FLAG || {
              echo "  WARNING: Real-ESRGAN upscaling failed, using original frames"
              cp "${frames_dir}"/*.png "$upscaled_dir/" 2>/dev/null || true
            }

            # Step 4: Reassemble video from upscaled frames + original audio
            echo "  Reassembling video..."
            if [ -f "downloads/audio_${filename%.*}.aac" ]; then
              ffmpeg -y -framerate "$fps" -i "${upscaled_dir}/frame_%06d.png" \
                -i "downloads/audio_${filename%.*}.aac" \
                -c:v libx264 -preset medium -crf 18 \
                -c:a aac -b:a 192k \
                -pix_fmt yuv420p -movflags +faststart \
                "processed/${filename}" 2>/dev/null
            else
              ffmpeg -y -framerate "$fps" -i "${upscaled_dir}/frame_%06d.png" \
                -c:v libx264 -preset medium -crf 18 \
                -pix_fmt yuv420p -movflags +faststart \
                "processed/${filename}" 2>/dev/null
            fi

            # Fallback: if reassembly failed, just crop + encode without upscaling
            if [ ! -f "processed/${filename}" ]; then
              echo "  ERROR: Upscale pipeline failed for $filename, falling back to ffmpeg"
              ffmpeg -y -i "$video" \
                ${crop_info:+-vf "${crop_info}"} \
                -c:v libx264 -preset medium -crf 20 \
                -c:a aac -b:a 192k \
                -movflags +faststart \
                "processed/${filename}" 2>/dev/null || {
                  echo "  ERROR: All processing failed, copying original"
                  cp "$video" "processed/${filename}"
                }
            fi

            # Cleanup temp files to save disk space
            rm -rf "$frames_dir" "$upscaled_dir" "downloads/audio_${filename%.*}.aac"
            [ "$cropped_video" != "$video" ] && rm -f "$cropped_video"
            rm -f "$video"
          done
          echo "Processed $(ls processed/ | wc -l) videos"

      - name: Create zip files with size limit
        run: |
          # GitHub release max file size is 2GB (2147483648 bytes).
          # Use 1900MB as safety margin to account for zip metadata overhead.
          MAX_SIZE=$((1900 * 1024 * 1024))
          zip_index=1
          current_size=0
          current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"

          for video in processed/*; do
            [ -f "$video" ] || continue
            file_size=$(stat -c%s "$video")

            # If a single file exceeds MAX_SIZE, put it in its own zip (store only, no compression overhead)
            if [ "$file_size" -ge "$MAX_SIZE" ]; then
              if [ "$current_size" -gt 0 ]; then
                zip_index=$((zip_index + 1))
              fi
              single_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              echo "Adding large file $(basename "$video") to $single_zip"
              zip -j -0 "$single_zip" "$video"
              zip_index=$((zip_index + 1))
              current_size=0
              current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              continue
            fi

            # If adding this file would exceed the limit, start a new zip
            if [ "$current_size" -gt 0 ] && [ $((current_size + file_size)) -ge "$MAX_SIZE" ]; then
              zip_index=$((zip_index + 1))
              current_size=0
              current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
            fi

            echo "Adding $(basename "$video") ($((file_size / 1024 / 1024))MB) to $current_zip"
            zip -j -0 "$current_zip" "$video"
            current_size=$((current_size + file_size))

            # Remove processed file to save disk space
            rm -f "$video"
          done

          echo "Created $(ls zips/*.zip 2>/dev/null | wc -l) zip file(s):"
          ls -lh zips/

      - name: Create release and upload zips
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          TAG="videos-${TIMESTAMP}"
          TITLE="Processed Videos - ${TIMESTAMP}"
          BODY="Processed videos with black borders removed and quality improved using Real-ESRGAN.

          - Black borders auto-detected and cropped using ffmpeg cropdetect
          - Frames upscaled with Real-ESRGAN (RealESRGAN_x4plus model)
          - Re-encoded with x264 (CRF 18) for high quality output
          - Videos split into zip parts (max ~1.9GB each)

          Total zip files: $(ls zips/*.zip 2>/dev/null | wc -l)"

          # Create the release
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            zips/*.zip
