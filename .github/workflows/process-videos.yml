name: Process Videos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-videos:
    runs-on: mp4  # Self-hosted: Ubuntu 24.04 · 64 cores · 256 GB RAM · 2040 GB SSD
    timeout-minutes: 480

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: System optimizations
        run: |
          echo "=== CPU: set performance governor (64 cores) ==="
          for gov in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
            echo performance | sudo tee "$gov" > /dev/null 2>&1 || true
          done
          cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor 2>/dev/null \
            || echo "(cpufreq not available on this runner)"
          # Keep ffmpeg worker threads on the same cores — reduces cache-miss migrations
          sudo sysctl -w kernel.sched_migration_cost_ns=5000000 || true

          echo "=== RAM tuning (256 GB) ==="
          # With 256 GB, swap should almost never be needed
          sudo sysctl -w vm.swappiness=1
          # Buffer up to 40% of RAM as dirty pages before flush — huge write throughput
          sudo sysctl -w vm.dirty_ratio=40
          sudo sysctl -w vm.dirty_background_ratio=3
          # Retain inode/dentry cache aggressively (fast repeated file-metadata lookups)
          sudo sysctl -w vm.vfs_cache_pressure=50
          # Allow memory over-commit (needed for 16 parallel ffmpeg allocations)
          sudo sysctl -w vm.overcommit_memory=1

          echo "=== Network tuning (64 concurrent downloads) ==="
          sudo sysctl -w net.core.rmem_max=134217728
          sudo sysctl -w net.core.wmem_max=134217728
          sudo sysctl -w net.ipv4.tcp_rmem='4096 87380 134217728'
          sudo sysctl -w net.ipv4.tcp_wmem='4096 65536 134217728'
          sudo sysctl -w net.core.netdev_max_backlog=5000
          sudo sysctl -w net.ipv4.tcp_window_scaling=1
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1

          echo "=== File descriptor limits ==="
          # Raise the per-process limit so 16 parallel ffmpeg jobs never hit EMFILE
          sudo bash -c 'echo "* soft nofile 1048576" >> /etc/security/limits.conf'
          sudo bash -c 'echo "* hard nofile 1048576" >> /etc/security/limits.conf'
          ulimit -n 1048576 2>/dev/null || true

          echo "=== Disable THP defrag (reduces latency spikes during encoding) ==="
          echo madvise | sudo tee /sys/kernel/mm/transparent_hugepage/defrag \
            > /dev/null 2>&1 || true

          echo "=== I/O scheduler: none (NVMe SSD optimal), mq-deadline as fallback ==="
          for sched in /sys/block/*/queue/scheduler; do
            echo none        | sudo tee "$sched" > /dev/null 2>&1 || \
            echo mq-deadline | sudo tee "$sched" > /dev/null 2>&1 || true
          done

          echo "=== System summary ==="
          echo "CPUs : $(nproc)"
          echo "RAM  :"; free -h
          echo "Disk :"; df -h .

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg aria2 zip
          # Install GitHub CLI if not already available (needed for release creation)
          if ! command -v gh &>/dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq gh
          fi

      - name: Create working directories
        run: |
          mkdir -p downloads processed zips
          # 256 GB RAM: mount processed/ as a RAM-disk.
          # Peak usage = 16 parallel outputs × ~2 GB each ≈ 32 GB; 40 G gives headroom.
          # Encode output writes at RAM speed, eliminating SSD write latency.
          echo "Mounting processed/ on tmpfs (40G)..."
          sudo mount -t tmpfs -o size=40G tmpfs processed/

      - name: Download videos
        run: |
          total=$(wc -l < video_urls.txt)
          echo "Preparing $total downloads..."

          # Build an aria2c input file for batch concurrent downloading
          count=0
          while IFS='|' read -r url rest || [ -n "$url" ]; do
            count=$((count + 1))
            # Strip leading number prefix (e.g. "1. https://..." -> "https://...")
            url=$(echo "$url" | sed -E 's/^[0-9]+\.\s*//')
            [ -z "$url" ] && continue
            # Extract filename from URL
            filename=$(basename "$url")
            # Make filename unique by prepending a counter
            unique_name="${count}_${filename}"
            # aria2c input file format: URL\n  out=filename\n
            echo "$url"
            echo "  out=${unique_name}"
          done < video_urls.txt > /tmp/aria2_downloads.txt

          echo "Starting batch download of $total files with aria2c (multi-threaded)..."
          aria2c \
            --input-file=/tmp/aria2_downloads.txt \
            --dir=downloads \
            --max-concurrent-downloads=64 \
            --max-connection-per-server=16 \
            --split=16 \
            --min-split-size=1M \
            --disk-cache=1G \
            --file-allocation=falloc \
            --max-tries=5 \
            --retry-wait=3 \
            --connect-timeout=10 \
            --timeout=120 \
            --max-overall-download-limit=0 \
            --max-download-limit=0 \
            --optimize-concurrent-downloads=true \
            --stream-piece-selector=geom \
            --uri-selector=adaptive \
            --console-log-level=warn \
            --summary-interval=15 \
            --auto-file-renaming=false \
            --allow-overwrite=true || echo "WARNING: Some downloads may have failed"

          echo "Downloaded $(ls downloads/ | wc -l) videos"

      - name: Process videos - crop, denoise, sharpen and re-encode (64 vCPUs)
        run: |
          # 16 parallel jobs × 4 threads each = 64 vCPUs fully utilised
          PARALLEL_JOBS=16
          THREADS_PER_JOB=4

          # Filter chain applied to every video (order matters):
          #   hqdn3d=4:3:6:4.5        — spatial + temporal noise reduction
          #   unsharp=5:5:1.0:5:5:0.0  — luma sharpening
          ENHANCE_FILTERS="hqdn3d=4:3:6:4.5,unsharp=5:5:1.0:5:5:0.0"

          echo "Encoder  : libx264 preset slow CRF 17"
          echo "Workers  : ${PARALLEL_JOBS} jobs × ${THREADS_PER_JOB} threads = 64 vCPUs"
          echo "Filters  : crop (auto) → hqdn3d (denoise) → unsharp (sharpen)"

          process_video() {
            local video="$1"
            local filename
            filename=$(basename "$video")

            # Skip non-video files (.ts, .txt, .html, etc.)
            case "${filename,,}" in
              *.mp4|*.mkv|*.avi|*.mov|*.wmv|*.flv|*.webm|*.m4v|*.mpg|*.mpeg) ;;
              *) echo "  Skipping non-video file: $filename"; rm -f "$video"; return ;;
            esac
            echo "Processing: $filename"

            # 1. Get source dimensions
            src_w=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=width  -of csv=p=0 "$video" 2>/dev/null)
            src_h=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=height -of csv=p=0 "$video" 2>/dev/null)
            echo "  Source dimensions: ${src_w}x${src_h}"

            # 2. Cropdetect over first 30 s — most frequent crop wins
            crop_info=$(ffmpeg -threads 2 -i "$video" -t 30 \
              -vf cropdetect=24:16:0 -f null - 2>&1 \
              | grep -oP 'crop=\S+' | sort | uniq -c | sort -rn | head -1 \
              | awk '{print $2}' || echo "")

            # 3. Validate crop and build filter chain: [crop,] hqdn3d, unsharp
            CROP_PREFIX=""
            if [ -n "$crop_info" ]; then
              crop_w=$(echo "$crop_info" | cut -d= -f2 | cut -d: -f1)
              crop_h=$(echo "$crop_info" | cut -d= -f2 | cut -d: -f2)
              crop_x=$(echo "$crop_info" | cut -d= -f2 | cut -d: -f3)
              crop_y=$(echo "$crop_info" | cut -d= -f2 | cut -d: -f4)
              # Accept only non-negative integers that fit inside the source frame
              if echo "$crop_w $crop_h $crop_x $crop_y" \
                   | grep -qP '^[0-9]+ [0-9]+ [0-9]+ [0-9]+$' && \
                 [ "$crop_w" -gt 0 ] && [ "$crop_h" -gt 0 ] && \
                 { [ -z "$src_w" ] || [ "$((crop_x + crop_w))" -le "$src_w" ]; } && \
                 { [ -z "$src_h" ] || [ "$((crop_y + crop_h))" -le "$src_h" ]; }; then
                if [ "$crop_w" != "$src_w" ] || [ "$crop_h" != "$src_h" ] || \
                   [ "$crop_x" != "0" ]       || [ "$crop_y" != "0" ]; then
                  echo "  Applying crop: ${crop_w}x${crop_h}+${crop_x}+${crop_y}"
                  CROP_PREFIX="${crop_info},"
                else
                  echo "  No black borders detected, skipping crop"
                fi
              else
                echo "  WARNING: Invalid/out-of-bounds crop (${crop_info}), skipping crop"
              fi
            fi

            VF_ARGS="-vf ${CROP_PREFIX}${ENHANCE_FILTERS}"

            # 4. Encode with libx264 — high quality, all assigned threads
            local enc_log
            enc_log=$(mktemp)
            # shellcheck disable=SC2086
            ffmpeg -y \
              -threads "${THREADS_PER_JOB}" \
              -thread_queue_size 512 \
              -i "$video" \
              $VF_ARGS \
              -c:v libx264 -preset slow -crf 17 \
              -c:a aac -b:a 192k \
              -pix_fmt yuv420p -movflags +faststart \
              "processed/${filename}" 2>"$enc_log" || {
                echo "  ERROR: ffmpeg failed for $filename:"
                cat "$enc_log"
                # Last resort — copy original unchanged
                cp "$video" "processed/${filename}"
              }
            rm -f "$enc_log"

            rm -f "$video"
            echo "  Done: $filename. Disk: $(df -h . | tail -1 | awk '{print $4}') free"
          }

          export -f process_video
          export THREADS_PER_JOB ENHANCE_FILTERS

          # Process all videos in parallel — -print0/-0 handles spaces in filenames
          find downloads -maxdepth 1 -type f -print0 | \
            xargs -0 -P "${PARALLEL_JOBS}" -I{} bash -c 'process_video "$@"' _ {}

          echo "Processed $(ls processed/ | wc -l) videos"

      - name: Create zip files with size limit
        run: |
          # GitHub release max file size is 2GB (2147483648 bytes).
          # Use 1900MB as safety margin to account for zip metadata overhead.
          MAX_SIZE=$((1900 * 1024 * 1024))
          zip_index=1
          current_size=0
          current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"

          for video in processed/*; do
            [ -f "$video" ] || continue
            file_size=$(stat -c%s "$video")

            # If a single file exceeds MAX_SIZE, put it in its own zip (store only, no compression overhead)
            if [ "$file_size" -ge "$MAX_SIZE" ]; then
              if [ "$current_size" -gt 0 ]; then
                zip_index=$((zip_index + 1))
              fi
              single_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              echo "Adding large file $(basename "$video") to $single_zip"
              zip -j -0 "$single_zip" "$video"
              zip_index=$((zip_index + 1))
              current_size=0
              current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              continue
            fi

            # If adding this file would exceed the limit, start a new zip
            if [ "$current_size" -gt 0 ] && [ $((current_size + file_size)) -ge "$MAX_SIZE" ]; then
              zip_index=$((zip_index + 1))
              current_size=0
              current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
            fi

            echo "Adding $(basename "$video") ($((file_size / 1024 / 1024))MB) to $current_zip"
            zip -j -0 "$current_zip" "$video"
            current_size=$((current_size + file_size))

            # Remove processed file to save disk space
            rm -f "$video"
          done

          echo "Created $(ls zips/*.zip 2>/dev/null | wc -l) zip file(s):"
          ls -lh zips/

      - name: Create release and upload zips
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          TAG="videos-${TIMESTAMP}"
          TITLE="Processed Videos - ${TIMESTAMP}"
          BODY="Processed $(ls zips/*.zip 2>/dev/null | wc -l || echo 'unknown') zip parts — Ubuntu 24.04 · 64 cores · 256 GB RAM · 2040 GB SSD.

          System tuning
          - CPU governor: performance (64 cores)
          - RAM: vm.swappiness=1, dirty_ratio=40, overcommit=1 (256 GB)
          - processed/ on tmpfs RAM-disk (40 GB)
          - NVMe I/O scheduler: none
          - Network: 128 MB TCP buffers, 64 concurrent download streams
          - aria2c: disk-cache=1G, file-allocation=falloc

          Video processing (16 workers × 4 threads = 64 vCPUs)
          - Black borders removed (cropdetect, 30 s sample)
          - Noise reduction: hqdn3d (spatial + temporal)
          - Sharpening: unsharp luma filter
          - Encoder: libx264 preset slow CRF 17
          - Audio: AAC 192 kbps
          - ZIP parts: max ~1.9 GB each"

          # Create the release
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            zips/*.zip
