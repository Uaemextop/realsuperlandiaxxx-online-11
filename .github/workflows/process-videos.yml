name: Process Videos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-videos:
    runs-on: mp4  # GitHub Enterprise self-hosted runner with GPU
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NVIDIA drivers and CUDA toolkit
        run: |
          echo "=== Checking for existing NVIDIA GPU hardware ==="
          lspci | grep -i nvidia || echo "No NVIDIA PCI devices listed (may need driver)"

          # Install NVIDIA driver and CUDA toolkit if not already present
          if ! command -v nvidia-smi &>/dev/null; then
            echo "nvidia-smi not found — installing NVIDIA drivers and CUDA toolkit..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq ubuntu-drivers-common nvidia-cuda-toolkit
            # Auto-detect and install the recommended driver for the GPU
            RECOMMENDED=$(ubuntu-drivers devices 2>/dev/null | grep -oP 'nvidia-driver-\d+' | sort -t- -k3 -n | tail -1)
            if [ -n "$RECOMMENDED" ]; then
              echo "Installing recommended driver: $RECOMMENDED"
              sudo apt-get install -y -qq "$RECOMMENDED"
            else
              echo "No recommended driver found, installing nvidia-driver-535 as default"
              sudo apt-get install -y -qq nvidia-driver-535
            fi
            # Reload the NVIDIA kernel module
            sudo modprobe nvidia || true
          fi

          # Ensure CUDA paths are available
          export PATH="/usr/local/cuda/bin:$PATH"
          export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"

          echo "=== GPU status ==="
          nvidia-smi || echo "WARNING: nvidia-smi failed — GPU may not be available"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg aria2

      - name: Create working directories
        run: |
          mkdir -p downloads processed zips

      - name: Download videos
        run: |
          total=$(wc -l < video_urls.txt)
          echo "Preparing $total downloads..."

          # Build an aria2c input file for batch concurrent downloading
          count=0
          while IFS='|' read -r url rest || [ -n "$url" ]; do
            count=$((count + 1))
            # Strip leading number prefix (e.g. "1. https://..." -> "https://...")
            url=$(echo "$url" | sed -E 's/^[0-9]+\.\s*//')
            [ -z "$url" ] && continue
            # Extract filename from URL
            filename=$(basename "$url")
            # Make filename unique by prepending a counter
            unique_name="${count}_${filename}"
            # aria2c input file format: URL\n  out=filename\n
            echo "$url"
            echo "  out=${unique_name}"
          done < video_urls.txt > /tmp/aria2_downloads.txt

          echo "Starting batch download of $total files with aria2c (multi-threaded)..."
          aria2c \
            --input-file=/tmp/aria2_downloads.txt \
            --dir=downloads \
            --max-concurrent-downloads=32 \
            --max-connection-per-server=16 \
            --split=16 \
            --min-split-size=1M \
            --file-allocation=none \
            --max-tries=5 \
            --retry-wait=3 \
            --connect-timeout=10 \
            --timeout=120 \
            --max-overall-download-limit=0 \
            --max-download-limit=0 \
            --optimize-concurrent-downloads=true \
            --stream-piece-selector=geom \
            --uri-selector=adaptive \
            --console-log-level=warn \
            --summary-interval=15 \
            --auto-file-renaming=false \
            --allow-overwrite=true || echo "WARNING: Some downloads may have failed"

          echo "Downloaded $(ls downloads/ | wc -l) videos"

      - name: Process videos - remove black borders and re-encode with GPU
        run: |
          # Ensure CUDA paths are available
          export PATH="/usr/local/cuda/bin:$PATH"
          export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"

          # Detect GPU and choose encoder
          ENCODER="libx264"
          HWACCEL_FLAGS=""
          if command -v nvidia-smi &>/dev/null; then
            GPU_NAME=$(nvidia-smi --query-gpu=name,memory.total --format=csv,noheader 2>/dev/null | head -1)
            if [ -n "$GPU_NAME" ]; then
              echo "GPU detected: $GPU_NAME"
              # Test if h264_nvenc is available in ffmpeg
              if ffmpeg -hide_banner -encoders 2>/dev/null | grep -q h264_nvenc; then
                ENCODER="h264_nvenc"
                HWACCEL_FLAGS="-hwaccel cuda -hwaccel_output_format cuda"
                echo "Using GPU-accelerated encoder: h264_nvenc"
              else
                echo "h264_nvenc not available, falling back to libx264"
              fi
            fi
          fi

          if [ "$ENCODER" = "libx264" ]; then
            echo "Using CPU encoder: libx264"
          fi

          for video in downloads/*; do
            [ -f "$video" ] || continue
            filename=$(basename "$video")
            echo "Processing: $filename"

            # Detect crop values (black borders) by analyzing 10 seconds of the video
            crop_info=$(ffmpeg -i "$video" -t 10 -vf cropdetect=24:16:0 -f null - 2>&1 \
              | grep -oP 'crop=\S+' | tail -1 || echo "")

            # Build ffmpeg filter and hwaccel flags per video
            VF_ARGS=""
            if [ -n "$crop_info" ]; then
              echo "  Detected crop: $crop_info"
              VF_ARGS="-vf ${crop_info}"
            fi

            # Encode with chosen encoder
            # Note: hwaccel cuda is only used when no crop filter is needed,
            # because crop operates on CPU frames. h264_nvenc encoding still
            # uses the GPU regardless of the decoding path.
            if [ "$ENCODER" = "h264_nvenc" ]; then
              if [ -z "$VF_ARGS" ]; then
                ACCEL_FLAGS="$HWACCEL_FLAGS"
              else
                ACCEL_FLAGS=""
              fi
              # shellcheck disable=SC2086
              ffmpeg -y $ACCEL_FLAGS -i "$video" \
                $VF_ARGS \
                -c:v h264_nvenc -preset p4 -cq 18 -b:v 0 \
                -c:a aac -b:a 192k \
                -pix_fmt yuv420p -movflags +faststart \
                "processed/${filename}" 2>/dev/null || {
                  echo "  WARNING: NVENC failed, retrying with libx264"
                  # shellcheck disable=SC2086
                  ffmpeg -y -i "$video" \
                    $VF_ARGS \
                    -c:v libx264 -preset fast -crf 18 \
                    -c:a aac -b:a 192k \
                    -pix_fmt yuv420p -movflags +faststart \
                    "processed/${filename}" 2>/dev/null
                }
            else
              # shellcheck disable=SC2086
              ffmpeg -y -i "$video" \
                $VF_ARGS \
                -c:v libx264 -preset fast -crf 18 \
                -c:a aac -b:a 192k \
                -pix_fmt yuv420p -movflags +faststart \
                "processed/${filename}" 2>/dev/null
            fi

            # Fallback: if encoding failed, copy original
            if [ ! -f "processed/${filename}" ]; then
              echo "  ERROR: All processing failed for $filename, copying original"
              cp "$video" "processed/${filename}"
            fi

            # Remove original to save disk space
            rm -f "$video"
            echo "  Done. Disk: $(df -h . | tail -1 | awk '{print $4}') free"
          done
          echo "Processed $(ls processed/ | wc -l) videos"

      - name: Create zip files with size limit
        run: |
          # GitHub release max file size is 2GB (2147483648 bytes).
          # Use 1900MB as safety margin to account for zip metadata overhead.
          MAX_SIZE=$((1900 * 1024 * 1024))
          zip_index=1
          current_size=0
          current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"

          for video in processed/*; do
            [ -f "$video" ] || continue
            file_size=$(stat -c%s "$video")

            # If a single file exceeds MAX_SIZE, put it in its own zip (store only, no compression overhead)
            if [ "$file_size" -ge "$MAX_SIZE" ]; then
              if [ "$current_size" -gt 0 ]; then
                zip_index=$((zip_index + 1))
              fi
              single_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              echo "Adding large file $(basename "$video") to $single_zip"
              zip -j -0 "$single_zip" "$video"
              zip_index=$((zip_index + 1))
              current_size=0
              current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              continue
            fi

            # If adding this file would exceed the limit, start a new zip
            if [ "$current_size" -gt 0 ] && [ $((current_size + file_size)) -ge "$MAX_SIZE" ]; then
              zip_index=$((zip_index + 1))
              current_size=0
              current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
            fi

            echo "Adding $(basename "$video") ($((file_size / 1024 / 1024))MB) to $current_zip"
            zip -j -0 "$current_zip" "$video"
            current_size=$((current_size + file_size))

            # Remove processed file to save disk space
            rm -f "$video"
          done

          echo "Created $(ls zips/*.zip 2>/dev/null | wc -l) zip file(s):"
          ls -lh zips/

      - name: Create release and upload zips
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          TAG="videos-${TIMESTAMP}"
          TITLE="Processed Videos - ${TIMESTAMP}"
          BODY="Processed videos with black borders removed and re-encoded using GPU-accelerated ffmpeg.

          - Black borders auto-detected and cropped using ffmpeg cropdetect
          - Re-encoded with h264_nvenc (GPU) or libx264 (CPU fallback)
          - Videos split into zip parts (max ~1.9GB each)

          Total zip files: $(ls zips/*.zip 2>/dev/null | wc -l)"

          # Create the release
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            zips/*.zip
